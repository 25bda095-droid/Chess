version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./chess.db
      - FRONTEND_URL=http://localhost,http://localhost:8080,http://127.0.0.1
    env_file:
      - .env
    volumes:
      - ./chess.db:/app/chess.db
    depends_on:
      - redis
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["celery", "-A", "backend.celery_worker.celery_app", "worker", "--loglevel=info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./chess.db
    env_file:
      - .env
    volumes:
      - ./chess.db:/app/chess.db
    depends_on:
      - redis
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: always
